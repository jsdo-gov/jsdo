<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>بطاقة تهنئة عيد الفطر</title>

<style>
    
    h2, p, input, button, a {
        font-family: "SakkalMajalla", Arial, sans-serif !important;
    }

    @font-face {
        font-family: 'SakkalMajalla';
        src: url('SakkalMajalla.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
    body {
        font-family: "SakkalMajalla", Arial, sans-serif;
        background: #f5f5f5;
        text-align: center;
        padding: 40px;
    }

    input {
        width: 60%;
        padding: 12px;
        margin-top: 10px;
        font-size: 22px;
        text-align: center;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 15px;
        padding: 12px 25px;
        font-size: 20px;
        background-color: #6a3b1a;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    canvas {
        margin-top: 25px;
        max-width: 100%;
        border: 1px solid #ddd;
    }

    #downloadBtn {
        display: none;
        margin-top: 20px;
        padding: 12px 25px;
        background-color: #066835;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-size: 18px;
    }
</style>
</head>

<body>

    <h2>اللإدارة العامة للتقنية المعلومات و التحول الرقمي تهنيكم بعيد الفطر المبارك</h2>
    <p>اكتب اسمك وسيظهر داخل بطاقة التهنئة</p>

    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا" />
    <br>
    <button onclick="generate()">إنشاء البطاقة</button>

    <br>
    <canvas id="cardCanvas" width="1080" height="1200"></canvas>

    <br>
    <a id="downloadBtn" download="EidCard.png">تحميل البطاقة</a>

<script>
        // Ensure font is loaded before using in canvas
    document.fonts.load("42px 'SakkalMajalla'").then(() => {
        console.log("Sakkal Majalla Loaded");
    });
    const canvas = document.getElementById("cardCanvas");
    const ctx = canvas.getContext("2d");

    const template = new Image();

    // IMPORTANT: update this SharePoint path after upload
    template.src = "certificate-template.jpg";

    template.onload = function () {
        ctx.drawImage(template, 0, 0, canvas.width, canvas.height);
    };

    function generate() {
        const name = document.getElementById("nameInput").value.trim();
        if (!name) {
            alert("الرجاء كتابة الاسم");
            return;
        }

        // redraw background
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(template, 0, 0, canvas.width, canvas.height);

        // text styling
      
        ctx.font = "42px 'SakkalMajalla'";
        ctx.fillStyle = "white";
        ctx.textAlign = "center";


        // FINAL PERFECT POSITION FOR NAME (centered inside brown bar)
        const x = canvas.width / 2;   // horizontal center
        const y = 920;               // vertical center of bar

        ctx.fillText(name, x, y);

        // Show download button
        document.getElementById("downloadBtn").href = canvas.toDataURL("image/png");
        document.getElementById("downloadBtn").style.display = "inline-block";
    }
</script>

</body>
</html>
